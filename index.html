          <h2>Tính năng nổi bật</h2>
          <ul>
            <li><strong>AI Content Engine:</strong> Tạo nội dung cho 12 kênh (TikTok, Facebook, Instagram, LinkedIn, Blog, Email, v.v.) từ một brief duy nhất.</li>
            <li><strong>Brand Voice AI:</strong> Giữ giọng nói thương hiệu nhất quán trên mọi kênh, mọi bài viết.</li>
            <li><strong>Industry Memory:</strong> Hệ thống trí nhớ ngành tự động học và áp dụng thuật ngữ, tone phù hợp từng lĩnh vực.</li>
            <li><strong>Compliance Engine:</strong> Tự động kiểm tra tuân thủ quy định ngành (Y tế, Tài chính, Giáo dục, v.v.).</li>
            <li><strong>Multi-channel Publishing:</strong> Đăng nội dung lên nhiều kênh social media cùng lúc.</li>
            <li><strong>Ad Copy AI:</strong> Tạo quảng cáo tối ưu cho Facebook Ads, Google Ads với A/B testing tích hợp.</li>
          </ul>

          <h2>Chính sách bảo mật</h2>
          <p><em>Cập nhật lần cuối: 18 tháng 3, 2026</em></p>

          <h3>1. Giới thiệu</h3>
          <p>Flowa ("chúng tôi") cam kết bảo vệ quyền riêng tư và dữ liệu cá nhân của bạn. Chính sách Bảo mật này giải thích cách chúng tôi thu thập, sử dụng, lưu trữ và bảo vệ thông tin của bạn khi sử dụng nền tảng Flowa.</p>
          <p>Chính sách này tuân thủ các quy định hiện hành về bảo vệ dữ liệu cá nhân tại Việt Nam (Nghị định 13/2023/NĐ-CP) và các tiêu chuẩn quốc tế.</p>

          <h3>2. Thông tin chúng tôi thu thập</h3>
          <h4>2.1. Thông tin bạn cung cấp trực tiếp</h4>
          <ul>
            <li>Họ tên, địa chỉ email khi đăng ký tài khoản.</li>
            <li>Thông tin tổ chức (tên công ty, ngành nghề, quy mô).</li>
            <li>Thông tin thương hiệu (brand voice, sản phẩm, đối tượng khách hàng).</li>
            <li>Nội dung bạn tạo và chỉnh sửa trên nền tảng.</li>
            <li>Thông tin thanh toán (được xử lý qua cổng thanh toán bảo mật).</li>
          </ul>
          <h4>2.2. Thông tin thu thập tự động</h4>
          <ul>
            <li>Địa chỉ IP, loại trình duyệt, hệ điều hành.</li>
            <li>Dữ liệu sử dụng: tần suất truy cập, tính năng sử dụng, thời gian phiên làm việc.</li>
            <li>Cookie và công nghệ theo dõi tương tự.</li>
          </ul>
          <h4>2.3. Thông tin từ bên thứ ba</h4>
          <ul>
            <li>Dữ liệu từ kết nối mạng xã hội (Facebook, Instagram, LinkedIn, TikTok, v.v.) khi bạn liên kết tài khoản.</li>
            <li>Thông tin xác thực từ đăng nhập Google (nếu sử dụng).</li>
          </ul>

          <h3>3. Mục đích sử dụng thông tin</h3>
          <p>Chúng tôi sử dụng thông tin của bạn để:</p>
          <ul>
            <li>Cung cấp và cải thiện dịch vụ Flowa.</li>
            <li>Cá nhân hóa trải nghiệm AI và nội dung gợi ý.</li>
            <li>Xử lý thanh toán và quản lý gói dịch vụ.</li>
            <li>Gửi thông báo quan trọng về dịch vụ và bảo mật.</li>
            <li>Phân tích xu hướng sử dụng để cải thiện sản phẩm (dạng ẩn danh).</li>
            <li>Đảm bảo tuân thủ ngành nghề thông qua hệ thống Compliance.</li>
            <li>Phòng chống gian lận và bảo vệ an toàn hệ thống.</li>
            <li>Hỗ trợ khách hàng và giải quyết vấn đề kỹ thuật.</li>
          </ul>

          <h3>4. Bảo mật dữ liệu</h3>
          <h4>4.1. Biện pháp kỹ thuật</h4>
          <ul>
            <li>Mã hóa AES-256 cho dữ liệu nhạy cảm (token mạng xã hội, API keys).</li>
            <li>Mã hóa TLS/SSL cho tất cả dữ liệu truyền tải.</li>
            <li>Row-Level Security (RLS) cách ly dữ liệu giữa các tổ chức.</li>
            <li>Prompt Guard bảo vệ chống tấn công injection.</li>
            <li>Hệ thống audit log theo dõi mọi hoạt động quản trị.</li>
          </ul>
          <h4>4.2. Biện pháp tổ chức</h4>
          <ul>
            <li>Phân quyền truy cập theo vai trò (RBAC): chỉ người có thẩm quyền mới truy cập dữ liệu nhạy cảm.</li>
            <li>Dữ liệu PII (Thông tin nhận dạng cá nhân) chỉ dành cho Global Admin.</li>
            <li>Safe views che giấu thông tin nhạy cảm trong giao diện quản trị.</li>
            <li>Đào tạo nhân viên về bảo mật thông tin định kỳ.</li>
          </ul>
          <h4>4.3. Lưu trữ dữ liệu</h4>
          <ul>
            <li>Dữ liệu được lưu trữ trên hạ tầng đám mây đáng tin cậy với tiêu chuẩn bảo mật cao.</li>
            <li>Sao lưu tự động hàng ngày với mã hóa.</li>
          </ul>

          <h3>5. Quyền của bạn</h3>
          <p>Bạn có các quyền sau đối với dữ liệu cá nhân:</p>
          <ul>
            <li><strong>Quyền truy cập:</strong> Yêu cầu bản sao dữ liệu cá nhân chúng tôi lưu trữ về bạn.</li>
            <li><strong>Quyền chỉnh sửa:</strong> Cập nhật hoặc sửa đổi thông tin cá nhân không chính xác.</li>
            <li><strong>Quyền xóa:</strong> Yêu cầu xóa dữ liệu cá nhân (trừ dữ liệu cần thiết cho nghĩa vụ pháp lý).</li>
            <li><strong>Quyền hạn chế xử lý:</strong> Hạn chế cách chúng tôi sử dụng dữ liệu trong một số trường hợp.</li>
            <li><strong>Quyền di chuyển dữ liệu:</strong> Xuất dữ liệu ở định dạng phổ biến.</li>
            <li><strong>Quyền rút lại đồng ý:</strong> Rút lại sự đồng ý đã cho trước đó bất kỳ lúc nào.</li>
          </ul>
          <p>Để thực hiện các quyền trên, liên hệ chúng tôi qua email: support@flowa.one. Chúng tôi sẽ phản hồi trong vòng 15 ngày làm việc.</p>

          <h3>6. Chia sẻ thông tin</h3>
          <p><strong>Chúng tôi KHÔNG bán dữ liệu cá nhân của bạn.</strong></p>
          <p>Chúng tôi chỉ chia sẻ thông tin trong các trường hợp:</p>
          <ul>
            <li><strong>Nhà cung cấp dịch vụ:</strong> Các đối tác xử lý thanh toán, lưu trữ đám mây, gửi email (đều có thỏa thuận bảo mật).</li>
            <li><strong>Mạng xã hội:</strong> Khi bạn chủ động kết nối và đăng nội dung (chỉ chia sẻ thông tin cần thiết).</li>
            <li><strong>AI Providers:</strong> Nội dung gửi để xử lý AI được ẩn danh hóa, không chứa PII.</li>
            <li><strong>Yêu cầu pháp lý:</strong> Khi có yêu cầu từ cơ quan có thẩm quyền theo quy định pháp luật.</li>
            <li><strong>Bảo vệ quyền lợi:</strong> Khi cần thiết để bảo vệ quyền lợi, tài sản hoặc an toàn của Flowa và người dùng.</li>
          </ul>

          <h3>7. Thời gian lưu trữ</h3>
          <ul>
            <li><strong>Tài khoản hoạt động:</strong> Dữ liệu được lưu trữ suốt thời gian tài khoản còn hoạt động.</li>
            <li><strong>Sau khi hủy tài khoản:</strong> Dữ liệu được giữ trong 30 ngày để phục hồi nếu cần, sau đó xóa vĩnh viễn.</li>
            <li><strong>Dữ liệu thanh toán:</strong> Lưu trữ theo yêu cầu pháp luật kế toán (tối thiểu 5 năm).</li>
            <li><strong>Dữ liệu audit log:</strong> Lưu trữ 12 tháng cho mục đích bảo mật.</li>
            <li><strong>Dữ liệu ẩn danh:</strong> Có thể được giữ vô thời hạn cho mục đích nghiên cứu và cải thiện sản phẩm.</li>
          </ul>

          <h3>8. Cookie và theo dõi</h3>
          <h4>8.1. Các loại cookie</h4>
          <ul>
            <li><strong>Cookie cần thiết:</strong> Để duy trì phiên đăng nhập và bảo mật. Không thể tắt.</li>
            <li><strong>Cookie phân tích:</strong> Thu thập dữ liệu sử dụng ẩn danh để cải thiện dịch vụ.</li>
            <li><strong>Cookie tùy chọn:</strong> Lưu trữ cài đặt ngôn ngữ, giao diện (sáng/tối).</li>
          </ul>
          <h4>8.2. Quản lý cookie</h4>
          <p>Bạn có thể quản lý cookie qua cài đặt trình duyệt. Tuy nhiên, tắt cookie cần thiết có thể ảnh hưởng đến trải nghiệm sử dụng.</p>

          <h3>9. Chuyển dữ liệu quốc tế</h3>
          <p>Dữ liệu có thể được xử lý tại các máy chủ bên ngoài Việt Nam. Trong trường hợp này, chúng tôi đảm bảo:</p>
          <ul>
            <li>Áp dụng các biện pháp bảo vệ phù hợp (Standard Contractual Clauses).</li>
            <li>Đối tác nhận dữ liệu tuân thủ các tiêu chuẩn bảo mật tương đương hoặc cao hơn.</li>
            <li>Tuân thủ quy định về chuyển dữ liệu xuyên biên giới theo Nghị định 13/2023/NĐ-CP.</li>
          </ul>

          <h3>10. Liên hệ về bảo mật</h3>
          <p>Nếu bạn có câu hỏi, khiếu nại, hoặc yêu cầu về quyền riêng tư, vui lòng liên hệ:</p>
          <ul>
            <li><strong>Email bảo mật:</strong> <a href="mailto:security@flowa.one">security@flowa.one</a></li>
            <li><strong>Email hỗ trợ:</strong> <a href="mailto:support@flowa.one">support@flowa.one</a></li>
            <li><strong>Website:</strong> <a href="https://flowa.one">flowa.one</a></li>
          </ul>
          <p>Chúng tôi cam kết phản hồi mọi yêu cầu liên quan đến bảo mật trong vòng 15 ngày làm việc.</p>
          <p>Chính sách này có thể được cập nhật theo thời gian. Thay đổi quan trọng sẽ được thông báo qua email ít nhất 15 ngày trước khi có hiệu lực.</p>
