# Nginx reverse proxy cho Flowa self-host
# /etc/nginx/sites-available/flowa.conf
# Cert do Certbot quản: certbot --nginx -d api.flowa.one -d studio.flowa.one

upstream supabase_kong {
    server 127.0.0.1:8000;
    keepalive 32;
}

upstream supabase_studio {
    server 127.0.0.1:3000;
    keepalive 16;
}

# ============================================================================
# api.flowa.one — Kong API Gateway (Auth, REST, Storage, Realtime, Functions)
# ============================================================================
server {
    listen 443 ssl http2;
    listen [::]:443 ssl http2;
    server_name api.flowa.one;

    ssl_certificate     /etc/letsencrypt/live/api.flowa.one/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/api.flowa.one/privkey.pem;
    ssl_protocols       TLSv1.2 TLSv1.3;
    ssl_ciphers         HIGH:!aNULL:!MD5;

    # Security headers
    add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-Frame-Options "DENY" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;

    # Body limits (carousel images, video clips)
    client_max_body_size 100M;
    client_body_buffer_size 1M;

    # Realtime WebSocket
    location /realtime/v1/ {
        proxy_pass http://supabase_kong;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 86400s;
        proxy_send_timeout 86400s;
    }

    # Edge functions — long timeout cho AI generation (Veo, carousel batch)
    location /functions/v1/ {
        proxy_pass http://supabase_kong;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 300s;
        proxy_send_timeout 300s;
        # SSE streaming (generate-carousel, generate-multichannel)
        proxy_buffering off;
        proxy_cache off;
    }

    # Auth, REST, Storage
    location / {
        proxy_pass http://supabase_kong;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 60s;
    }
}

# ============================================================================
# studio.flowa.one — Supabase Studio (admin UI) — IP allowlist
# ============================================================================
server {
    listen 443 ssl http2;
    server_name studio.flowa.one;

    ssl_certificate     /etc/letsencrypt/live/studio.flowa.one/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/studio.flowa.one/privkey.pem;

    # CHỈ cho phép IP văn phòng + IP nhà admin
    allow 203.0.113.0/24;   # ← thay bằng IP văn phòng thật
    allow 198.51.100.42;    # ← thay bằng IP nhà admin
    deny all;

    location / {
        proxy_pass http://supabase_studio;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }
}

# HTTP → HTTPS redirect
server {
    listen 80;
    listen [::]:80;
    server_name api.flowa.one studio.flowa.one;
    return 301 https://$host$request_uri;
}
